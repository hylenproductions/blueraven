[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Increase upload speed if your adapter supports it
upload_speed = 921600

; Serial monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Change BR_DEVICE_TAG here for each device family.
; For per-unit unique tags, remove this flag and derive the tag from
; the chip ID in setup() — see the README for how.
build_flags =
    -DBR_DEVICE_TAG='"A7X3"'
